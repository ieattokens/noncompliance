<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradingView Widget Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://s3.tradingview.com/tv.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js" defer></script>
    <script src="nasdaqnoncompliance.js" defer></script>
    <script src="tickers.js" defer></script>
    <style>
      #widgets {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        gap: 10px;
        margin-top: 20px;
        max-height: 80vh;
        overflow-y: auto;
      }
      input,
      button {
        padding: 10px;
        margin: 5px;
        font-size: 16px;
      }
      button {
        cursor: pointer;
      }
      h1 {
        text-align: center;
      }
      .widget-container {
        position: relative;
        padding: 10px;
      }
      .close-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        border: none;
        font-size: 14px;
        cursor: pointer;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      .button-container {
        text-align: center;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="calendar.html">View Calendar</a>
      <a href="technicalchart.html">View Chart</a>
      <a href="nasdaqnoncompliance.html">View Nasdaq Noncompliance</a>
    </nav>

    <h1>My Stock Dashboard</h1>

    <div class="button-container">
      <button id="showFilteredTickers" onclick="showFilteredTickers()">Show Filtered Tickers</button>
      <button id="showDefaultTickers" onclick="showDefaultTickers()">Show Default Tickers</button>
    </div>

    <div style="text-align: center">
      <input type="text" id="newTicker" placeholder="Enter stock ticker" />
      <button onclick="addTicker()">Add Ticker</button>
    </div>

    <div id="widgets"></div>
    <div id="paginationControls" style="text-align:center; margin-top: 20px;"></div>
    <div id="error-message" class="error-message"></div>

    <script>
      let currentPage = 0;
      const pageSize = 10;
      let fullTickerList = [];

      function renderPage(pageIndex) {
        const widgetsContainer = document.getElementById("widgets");
        widgetsContainer.innerHTML = ""; // Remove all existing widgets

        const start = pageIndex * pageSize;
        const end = start + pageSize;
        const pageTickers = fullTickerList.slice(start, end);

        pageTickers.forEach((ticker, index) => {
          let widgetDiv = document.createElement("div");
          widgetDiv.className = "widget-container";
          widgetDiv.id = `widget_${pageIndex}_${index}`;

          let closeButton = document.createElement("button");
          closeButton.className = "close-btn";
          closeButton.innerHTML = "&times;";
          closeButton.onclick = function () {
            widgetDiv.remove();
          };
          widgetDiv.appendChild(closeButton);

          widgetsContainer.appendChild(widgetDiv);

          let scriptElement = document.createElement("script");
          scriptElement.type = "text/javascript";
          scriptElement.innerHTML = `
            new TradingView.widget({
              "width": 400,
              "height": 300,
              "symbol": "${ticker}",
              "interval": "D",
              "timezone": "Etc/UTC",
              "theme": "dark",
              "style": "1",
              "locale": "en",
              "toolbar_bg": "#f1f3f6",
              "enable_publishing": false,
              "hide_legend": false,
              "save_image": false,
              "studies": ["Volume@tv-basicstudies", "RSI@tv-basicstudies"],
              "container_id": "widget_${pageIndex}_${index}"
            });
          `;
          widgetDiv.appendChild(scriptElement);
        });

        updatePaginationControls();
      }

      function updatePaginationControls() {
        const controls = document.getElementById("paginationControls");
        controls.innerHTML = "";

        const totalPages = Math.ceil(fullTickerList.length / pageSize);

        const prevBtn = document.createElement("button");
        prevBtn.textContent = "Previous";
        prevBtn.disabled = currentPage === 0;
        prevBtn.onclick = () => {
          if (currentPage > 0) {
            currentPage--;
            renderPage(currentPage);
          }
        };

        const nextBtn = document.createElement("button");
        nextBtn.textContent = "Next";
        nextBtn.disabled = currentPage >= totalPages - 1;
        nextBtn.onclick = () => {
          if (currentPage < totalPages - 1) {
            currentPage++;
            renderPage(currentPage);
          }
        };

        controls.appendChild(prevBtn);
        controls.appendChild(nextBtn);
      }

      function paginateWidgets(tickerList) {
        if (!tickerList || tickerList.length === 0) {
          console.log("No tickers found to paginate.");
          return;
        }
        fullTickerList = tickerList;
        currentPage = 0;
        renderPage(currentPage);
      }

      function showFilteredTickers() {
        const storedTickers = localStorage.getItem("filteredTickers");
        if (storedTickers) {
          const filteredTickers = JSON.parse(storedTickers);
          const symbols = filteredTickers.map(t => t.symbol);
          paginateWidgets(symbols);
        } else {
          alert("No filtered tickers found.");
        }
      }

      function showDefaultTickers() {
        paginateWidgets(tickers);
      }

      window.addTicker = function () {
        const newTicker = document.getElementById("newTicker").value.toUpperCase();
        if (newTicker && !tickers.includes(newTicker)) {
          tickers.push(newTicker);
          paginateWidgets(tickers);
          document.getElementById("newTicker").value = "";
        } else if (tickers.includes(newTicker)) {
          alert("Ticker already exists.");
        } else {
          alert("Please enter a valid ticker symbol.");
        }
      };

      window.onload = function () {
        console.log("Dashboard page loaded.");
        let storedTickers = localStorage.getItem("filteredTickers");

        if (storedTickers) {
          try {
            let parsedTickers = JSON.parse(storedTickers);
            let tickerSymbols = parsedTickers.map(t => t.symbol);
            paginateWidgets(tickerSymbols);
          } catch (error) {
            console.error("Error parsing stored tickers:", error);
          }
        } else {
          paginateWidgets(tickers); // fallback
        }
      };
    </script>
  </body>
</html>
